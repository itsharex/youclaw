name: Build & Release
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

jobs:
  # ── macOS builds ──
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
            bun_target: bun-darwin-arm64
            sidecar_suffix: aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"
            platform_label: "macOS Apple Silicon"
          - arch: x86_64
            runner: macos-latest
            bun_target: bun-darwin-x64
            sidecar_suffix: x86_64-apple-darwin
            tauri_args: "--target x86_64-apple-darwin"
            platform_label: "macOS Intel"

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.platform_label }}

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (x86_64 cross-compile)
        if: matrix.arch == 'x86_64'
        run: rustup target add x86_64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ matrix.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ matrix.arch }}-

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Set version
        shell: bash
        run: |
          bun -e "
            const fs = require('fs');
            const ver = '${{ steps.version.outputs.VERSION }}';
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = ver;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            tauri.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Prepare runtime directories
        run: mkdir -p agents && touch agents/.gitkeep
        shell: bash

      - name: Build sidecar
        run: |
          mkdir -p src-tauri/bin
          bun build --compile --target=${{ matrix.bun_target }} src/index.ts --outfile src-tauri/bin/youclaw-server-${{ matrix.sidecar_suffix }}

      - name: Import macOS certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.MAC_CERTS }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "You Claw v${{ steps.version.outputs.VERSION }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
          updaterJsonKeepUniversal: true

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · ${{ matrix.platform_label }} ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # ── Windows build ──
  build-windows:
    runs-on: windows-latest
    name: Build Windows x64

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-windows-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-x64-

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Set version
        shell: bash
        run: |
          bun -e "
            const fs = require('fs');
            const ver = '${{ steps.version.outputs.VERSION }}';
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = ver;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            tauri.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Build sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile src-tauri/bin/youclaw-server-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "You Claw v${{ steps.version.outputs.VERSION }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · Windows x64 ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # ── Linux build ── [temporarily disabled]
  build-linux:
    if: false
    runs-on: ubuntu-22.04
    name: Build Linux x64

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Set version
        shell: bash
        run: |
          bun -e "
            const fs = require('fs');
            const ver = '${{ steps.version.outputs.VERSION }}';
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = ver;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            tauri.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Prepare runtime directories
        run: mkdir -p agents && touch agents/.gitkeep
        shell: bash

      - name: Build sidecar
        run: |
          mkdir -p src-tauri/bin
          bun build --compile --target=bun-linux-x64 src/index.ts --outfile src-tauri/bin/youclaw-server-x86_64-unknown-linux-gnu

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "You Claw v${{ steps.version.outputs.VERSION }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · Linux x64 ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"
